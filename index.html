<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="brand-corner">
        <img class="brand-corner-image" src="img/cw_logo-horizontal.png" alt="charity: water logo">
    </div>

    <div class="game-wrapper">
        <h1 class="game-title">Water Drop</h1>
        <div class="intro-block">
            <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
            <p class="link-info">
                Learn more: <a href="https://www.charitywater.org" target="_blank">www.charitywater.org</a>
            </p>
        </div>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <div class="goal">Goal: <span id="goal">20</span></div>
            <label class="difficulty-control" for="difficulty-select">Difficulty:
                <select id="difficulty-select" aria-label="Select game difficulty">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
            </label>
            <button id="start-btn">Start Game</button>
        </div>

        <p id="game-message"></p>

        <div class="game-frame-wrap">
            <img class="frame-side-image frame-side-image-left" src="img/water-can-transparent.png" alt="left frame decoration">
            <div id="game-container">
            </div>
            <img class="frame-side-image frame-side-image-right" src="img/water-can-transparent.png" alt="right frame decoration">
        </div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
